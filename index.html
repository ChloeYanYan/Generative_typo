<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Type</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>
  <body>
    <div id="app">

      <header id="app-header">
        <div>
          <h1>Generative Typo</h1>
          <p>Turn text into expressive form</p>
        </div>
      </header>

      <div id="main">

      <div id="panel">
        <div id="controls">
          <div class="control-group">
            <div class="text-label-row">
              <label>Text</label>
              <button id="preset-example">Example</button>
            </div>
            <textarea id="text-input" rows="8">Type Something...</textarea>
          </div>

          <div class="section-title">Font Style</div>

          <div class="control-group">
            <label>Complexity <span class="val" id="val-layers">25</span></label>
            <input type="range" id="slider-layers" min="1" max="50" value="25" step="1">
          </div>

          <div class="control-group">
            <label>Distortion <span class="val" id="val-r">5</span></label>
            <input type="range" id="slider-r" min="1" max="20" value="5" step="1">
          </div>

          <div class="control-group">
            <label>Smoothness <span class="val" id="val-threshold">1</span></label>
            <input type="range" id="slider-threshold" min="0" max="1.5" value="1" step="0.1">
          </div>

          <div class="control-group">
            <label>Font Size <span class="val" id="val-fontsize">160</span></label>
            <input type="range" id="slider-fontsize" min="20" max="400" value="160" step="1">
          </div>

          <div class="control-group">
            <label>Letter Spacing <span class="val" id="val-spacing">20</span></label>
            <input type="range" id="slider-spacing" min="-50" max="200" value="20" step="1">
          </div>

          <div class="control-group">
            <button id="btn-randomize" style="width:100%;padding:8px 12px;">Randomize</button>
          </div>

          <div class="control-group">
            <label>Text Color</label>
            <input type="color" id="color-text" value="#FFF700">
          </div>

          <div class="control-group">
            <label>Background Color</label>
            <input type="color" id="color-bg" value="#010A8E">
          </div>

          <div class="control-group presets-group">
            <label>Presets</label>
            <div class="preset-buttons">
              <button id="preset-clean">Clean</button>
              <button id="preset-sketch">Sketch</button>
              <button id="preset-chaotic">Chaotic</button>
            </div>
          </div>
        </div>

        <div id="actions">
          <button id="btn-export-png">Export PNG</button>
          <button id="btn-export-svg">Export SVG</button>
        </div>

      </div>

      <div id="canvas-container"></div>

      </div><!-- end #main -->
    </div>

    <script src="sketch.js"></script>
  </body>
</html>
